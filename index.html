<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        <p class="subtitle">Choose your move to play against the computer!</p>
        
        <div class="button-group">
            <button class="game-btn rock" onclick="playGame('rock')">Rock</button>
            <button class="game-btn paper" onclick="playGame('paper')">Paper</button>
            <button class="game-btn scissor" onclick="playGame('scissor')">Scissors</button>
        </div>
    </div>

    <script src="rps.js"></script>
</body>
</html>
